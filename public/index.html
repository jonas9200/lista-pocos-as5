<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGS Irrigação - Lista Poços </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (MANTENHA TODO O CSS ANTERIOR - é o mesmo) */
        :root {
            --primary: #2e7d32;
            --secondary: #00695c;
            --accent: #2196F3;
            --light: #f5f5f7;
            --success: #4CAF50;
            --warning: #FFC107;
            --danger: #F44336;
            --info: #2196F3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdbb2d, #1e3a8a, #1a2a6c);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }

        h1 {
            font-size: 2.5rem;
            color: var(--accent);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .equipment-card {
            background: rgba(30, 30, 50, 0.8);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .equipment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .equipment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .equipment-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent);
        }

        .equipment-details {
            margin-bottom: 15px;
        }

        .equipment-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .detail-label {
            font-weight: bold;
        }

        .detail-value {
            color: var(--accent);
        }

        .equipment-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button i {
            margin-right: 8px;
        }

        button:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #d32f2f; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #388E3C; }
        .btn-warning { background: var(--warning); color: #333; }
        .btn-warning:hover { background: #FFA000; }
        .btn-info { background: var(--info); }
        .btn-info:hover { background: #1976D2; }

        .add-equipment-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(30, 30, 50, 0.5);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-equipment-card:hover {
            background: rgba(30, 30, 50, 0.7);
            border-color: var(--accent);
        }

        .add-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .add-text {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(30, 30, 50, 0.95);
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
        }

        .form-actions { display: flex; gap: 10px; margin-top: 20px; }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .error-message {
            background: var(--danger);
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
            grid-column: 1 / -1;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            grid-column: 1 / -1;
            opacity: 0.7;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .success-message {
            background: var(--success);
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }

        .github-info {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .equipment-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tint"></i> AGS Irrigação</h1>
            <p class="subtitle">Gerenciamento de Equipamentos</p>
            <div class="github-info">
                <i class="fab fa-github"></i> Dados salvos no GitHub
            </div>
        </header>

        <div id="message-container"></div>

        <div class="dashboard" id="equipment-dashboard">
            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Conectando com GitHub...
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="equipment-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Adicionar Equipamento</h2>
                <button class="close-modal" id="close-modal">&times;</button>
            </div>

            <form id="equipment-form">
                <input type="hidden" id="equipment-id">

                <div class="form-group">
                    <label for="equipment-name">Nome do Equipamento</label>
                    <input type="text" id="equipment-name" placeholder="Ex: Pivô Central 1" required>
                </div>

                <div class="form-group">
                    <label for="equipment-type">Tipo</label>
                    <select id="equipment-type" required>
                        <option value="">Selecione</option>
                        <option value="Pivô Central">Pivô Central</option>
                        <option value="linear">Linear</option>
                        <option value="aspersor">Aspersor</option>
                        <option value="Poço">Poço</option>
                        <option value="Pluviômetro">Pluviômetro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="equipment-location">Localização</label>
                    <input type="text" id="equipment-location" placeholder="Fazenda São João">
                </div>

                <div class="form-group">
                    <label for="equipment-url">URL do Painel</label>
                    <input type="url" id="equipment-url" placeholder="https://painel-exemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="equipment-description">Descrição</label>
                    <input type="text" id="equipment-description" placeholder="Descrição opcional">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-danger" id="cancel-btn">Cancelar</button>
                    <button type="submit" class="btn-success" id="submit-btn">
                        <i class="fas fa-spinner fa-spin" id="submit-spinner" style="display: none;"></i>
                        <span id="submit-text">Salvar no GitHub</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuração da API
        const API_BASE_URL = window.location.origin;

        document.addEventListener('DOMContentLoaded', () => {
            const dashboard = document.getElementById('equipment-dashboard');
            const modal = document.getElementById('equipment-modal');
            const closeModal = document.getElementById('close-modal');
            const cancelBtn = document.getElementById('cancel-btn');
            const form = document.getElementById('equipment-form');
            const title = document.getElementById('modal-title');
            const loading = document.getElementById('loading');
            const messageContainer = document.getElementById('message-container');
            const submitBtn = document.getElementById('submit-btn');
            const submitSpinner = document.getElementById('submit-spinner');
            const submitText = document.getElementById('submit-text');

            let equipments = [];
            let editing = null;

            // Função para mostrar mensagens
            function showMessage(message, type = 'success') {
                messageContainer.innerHTML = `
                    <div class="${type === 'success' ? 'success-message' : 'error-message'}">
                        <i class="fas ${type === 'success' ? 'fa-check' : 'fa-exclamation-triangle'}"></i>
                        ${message}
                    </div>
                `;
                setTimeout(() => {
                    messageContainer.innerHTML = '';
                }, 5000);
            }

            // Funções da API
            async function apiRequest(endpoint, options = {}) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api${endpoint}`, {
                        headers: {
                            'Content-Type': 'application/json',
                            ...options.headers
                        },
                        ...options
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `Erro ${response.status}: ${response.statusText}`);
                    }

                    return await response.json();
                } catch (error) {
                    console.error('Erro na requisição:', error);
                    showMessage(`Erro: ${error.message}`, 'error');
                    throw error;
                }
            }

            async function loadEquipments() {
                try {
                    showLoading();
                    equipments = await apiRequest('/equipments');
                    render();
                } catch (error) {
                    showError('Falha ao carregar equipamentos do GitHub.');
                }
            }

            async function saveEquipment(equipment) {
                if (editing) {
                    return await apiRequest(`/equipments/${editing}`, {
                        method: 'PUT',
                        body: JSON.stringify(equipment)
                    });
                } else {
                    return await apiRequest('/equipments', {
                        method: 'POST',
                        body: JSON.stringify(equipment)
                    });
                }
            }

            async function deleteEquipment(id) {
                return await apiRequest(`/equipments/${id}`, {
                    method: 'DELETE'
                });
            }

            function showLoading() {
                dashboard.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando equipamentos do GitHub...</div>';
            }

            function showError(message) {
                dashboard.innerHTML = `<div class="error-message">${message}</div>`;
            }

            function render() {
                dashboard.innerHTML = '';
                
                if (equipments.length === 0) {
                    dashboard.innerHTML = `
                        <div class="empty-state">
                            <i class="fab fa-github"></i>
                            <p>Nenhum equipamento cadastrado no GitHub</p>
                            <p style="margin-top: 10px; font-size: 0.9rem;">Clique em "Adicionar Equipamento" para começar</p>
                        </div>`;
                }

                equipments.forEach(eq => {
                    const card = document.createElement('div');
                    card.className = 'equipment-card';
                    let icon = 'fa-tint';
                    if (eq.type === 'Pivô Central') icon = 'fa-sync-alt';
                    else if (eq.type === 'linear') icon = 'fa-arrows-alt-h';
                    else if (eq.type === 'aspersor') icon = 'fa-shower';
                    else if (eq.type === 'micro') icon = 'fa-tint-slash';

                    card.innerHTML = `
                        <div class="equipment-header">
                            <div class="equipment-name"><i class="fas ${icon}"></i> ${eq.name}</div>
                        </div>
                        <div class="equipment-details">
                            <div class="equipment-detail"><span class="detail-label">Tipo:</span><span class="detail-value">${eq.type}</span></div>
                            <div class="equipment-detail"><span class="detail-label">Local:</span><span class="detail-value">${eq.location || 'N/D'}</span></div>
                            ${eq.description ? `<div class="equipment-detail"><span class="detail-label">Descrição:</span><span class="detail-value">${eq.description}</span></div>` : ''}
                            <div class="equipment-detail"><span class="detail-label">Criado em:</span><span class="detail-value">${new Date(eq.createdAt).toLocaleDateString()}</span></div>
                        </div>
                        <div class="equipment-actions">
                            <button class="btn-info" data-open="${eq.url}"><i class="fas fa-external-link-alt"></i> Acessar</button>
                            <button class="btn-warning" data-edit="${eq.id}"><i class="fas fa-edit"></i> Editar</button>
                            <button class="btn-danger" data-del="${eq.id}"><i class="fas fa-trash"></i> Remover</button>
                        </div>`;
                    dashboard.appendChild(card);
                });

                // Adicionar card de adicionar
                const addCard = document.createElement('div');
                addCard.className = 'add-equipment-card';
                addCard.id = 'add-equipment-btn';
                addCard.innerHTML = `
                    <div class="add-icon"><i class="fas fa-plus-circle"></i></div>
                    <div class="add-text">Adicionar Equipamento</div>`;
                dashboard.appendChild(addCard);

                // Adicionar event listeners
                setupEventListeners();
            }

            function setupEventListeners() {
                // Botão adicionar equipamento
                document.getElementById('add-equipment-btn').onclick = () => {
                    form.reset();
                    editing = null;
                    title.textContent = 'Adicionar Equipamento';
                    modal.style.display = 'flex';
                };

                // Fechar modal
                closeModal.onclick = cancelBtn.onclick = () => {
                    modal.style.display = 'none';
                };

                // Submeter formulário
                form.onsubmit = async (e) => {
                    e.preventDefault();
                    
                    // Mostrar loading no botão
                    submitSpinner.style.display = 'inline-block';
                    submitText.textContent = 'Salvando no GitHub...';
                    submitBtn.disabled = true;

                    const data = {
                        name: document.getElementById('equipment-name').value,
                        type: document.getElementById('equipment-type').value,
                        location: document.getElementById('equipment-location').value,
                        url: document.getElementById('equipment-url').value,
                        description: document.getElementById('equipment-description').value
                    };
                    
                    try {
                        await saveEquipment(data);
                        await loadEquipments();
                        modal.style.display = 'none';
                        showMessage(`Equipamento ${editing ? 'atualizado' : 'adicionado'} no GitHub com sucesso!`);
                    } catch (error) {
                        // Erro já foi mostrado
                    } finally {
                        // Restaurar botão
                        submitSpinner.style.display = 'none';
                        submitText.textContent = 'Salvar no GitHub';
                        submitBtn.disabled = false;
                    }
                };

                // Event delegation para os botões dos cards
                dashboard.onclick = async (e) => {
                    const target = e.target.closest('button');
                    if (!target) return;

                    const id = target.dataset.del || target.dataset.edit || target.dataset.open;
                    if (!id) return;

                    const eq = equipments.find(x => x.id == id || x.url == id);

                    if (target.dataset.del) {
                        if (confirm(`Excluir "${eq.name}" do GitHub?`)) {
                            try {
                                await deleteEquipment(id);
                                await loadEquipments();
                                showMessage('Equipamento excluído do GitHub com sucesso!');
                            } catch (error) {
                                // Erro já foi mostrado
                            }
                        }
                    } else if (target.dataset.edit) {
                        editing = eq.id;
                        document.getElementById('equipment-name').value = eq.name;
                        document.getElementById('equipment-type').value = eq.type;
                        document.getElementById('equipment-location').value = eq.location;
                        document.getElementById('equipment-url').value = eq.url;
                        document.getElementById('equipment-description').value = eq.description;
                        title.textContent = 'Editar Equipamento';
                        modal.style.display = 'flex';
                    } else if (target.dataset.open) {
                        window.open(eq.url, '_blank');
                    }
                };
            }

            // Iniciar carregamento
            loadEquipments();

            // Testar conexão com a API
            fetch(`${API_BASE_URL}/api/health`)
                .then(response => response.json())
                .then(data => {
                    console.log('✅ Conexão com API estabelecida:', data);
                    if (data.github === 'Conectado') {
                        showMessage('Conectado ao GitHub com sucesso!', 'success');
                    }
                })
                .catch(error => {
                    console.error('❌ Erro ao conectar com API:', error);
                    showError('Não foi possível conectar com o servidor.', 'error');
                });
        });
    </script>
</body>
</html>
